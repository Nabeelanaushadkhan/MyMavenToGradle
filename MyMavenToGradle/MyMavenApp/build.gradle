plugins {
    id 'java'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = 'MyMavenToGradle'

sourceCompatibility = '1.8'
targetCompatibility = '1.8'

jar {
    manifest {
        attributes(
            'Main-Class': 'com.example.App'
        )
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:3.8.1'
}
             
